name: shellcheck

# This tool's failure mode is silence (a broken script just stops flipping /
# starting runners), so lint every change. Public repo -> hosted minutes are
# free; deliberately NOT the RUNNER toggle (the linter must not depend on the
# runner machinery it guards).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # SC1090/SC1091 excluded: the `source .../common.sh` path is computed at
      # runtime, which shellcheck can't follow.
      - run: shellcheck -x -e SC1090,SC1091 bin/grt bin/grt-* lib/*.sh
